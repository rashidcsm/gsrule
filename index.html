<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sheet App Pro Secure</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

/* ?? ANTI COPY GLOBAL */
body{
margin:0;
padding:0;
font-family:sans-serif;
background:#002031;
height:100vh;
overflow:hidden;

-webkit-user-select:none;
-ms-user-select:none;
user-select:none;
}

/* APP */
.app{
display:flex;
flex-direction:column;
height:100vh;
position:relative;
}

/* ?? WATERMARK */
.app::before{
content:"PROTECTED CONTENT";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%) rotate(-25deg);
font-size:30px;
color:rgba(0,0,0,0.06);
white-space:nowrap;
pointer-events:none;
z-index:0;
}

/* TOP */
.topbar{
display:flex;
gap:8px;
padding:12px;
align-items:center;
z-index:2;
}

.search-box{
flex:1;
position:relative;
}

.search-box input{
width:80%;
height:45px;
border:none;
outline:none;
border-radius:12px;
padding:0 50px 0 14px;
background:#fff;
font-size:15px;
}

.clear-icon{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
font-size:18px;
color:#666;
cursor:pointer;
display:none;
}

.search-box.active .clear-icon{
display:block;
}

/* TOTAL */
.total-box{
height:30px;
display:flex;
align-items:center;
justify-content:center;
padding:0 14px;
border-radius:10px;
background:#00bcd4;
color:#fff;
font-weight:bold;
white-space:nowrap;
}

/* LIST */
#listContainer{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
position:relative;
z-index:2;
}

.card{
background:#00bcd4;
padding:14px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.item-title{
font-size:18px;
font-weight:bold;
margin-bottom:8px;
}

.price-badge{
display:inline-block;
background:#00bcd4;
color:#002030;
font-weight:bold;
margin-bottom:8px;
font-size:14px;
}

.read-more{
margin-top:10px;
color:#ff0000;
font-weight:bold;
cursor:pointer;
user-select:none;
}

.expand-details{
display:none;
margin-top:12px;
font-size:14px;
line-height:1.8;
background:#f7f7f7;
padding:12px;
border-radius:10px;
word-break:break-word;
}

.loading{
text-align:center;
padding:30px;
color:#666;
}

</style>
</head>

<body>

<div class="app">

<!-- TOP -->
<div class="topbar">

<div class="search-box" id="searchBox">

<input type="text" id="searchInput" placeholder="Search item...">

<span class="material-icons clear-icon" onclick="clearSearch()">
close
</span>

</div>

<div class="total-box" id="totalBox">0</div>

</div>

<!-- LIST -->
<div id="listContainer">
<div class="loading">Loading...</div>
</div>

</div>

<script>

/* SECURITY */
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function(e){
if(e.ctrlKey && ["c","u","s"].includes(e.key.toLowerCase())){
e.preventDefault();
}
});

/* CONFIG */
const currentSheet = "Sheet2";

const BASE_URL =
"https://script.google.com/macros/s/AKfycbwGhbCFls5uQUZ15iUVNJ1eoY6-OEBW-y-qrkAqXMam6sohWGgb2kkZwwjtjQl2R8nNnQ/exec";

function getApiUrl(){
return BASE_URL + "?sheet=" + encodeURIComponent(currentSheet);
}

/* DATA */
let allData = [];
let filteredData = [];

/* ELEMENTS */
const listContainer = document.getElementById("listContainer");
const totalBox = document.getElementById("totalBox");
const searchInput = document.getElementById("searchInput");
const searchBox = document.getElementById("searchBox");

/* SAFE HTML */
function safeHTML(text){
if(!text) return "";
text = String(text);
const temp = document.createElement("textarea");
temp.innerHTML = text;
text = temp.value;
return text.replace(/\n/g,"<br>");
}

/* LOAD */
async function loadData(){

listContainer.innerHTML =
`<div class="loading">Loading...</div>`;

try{

const res = await fetch(getApiUrl());
const data = await res.json();

allData = data;
filteredData = data;

render();

}catch(e){

console.log(e);

listContainer.innerHTML =
`<div class="loading">Failed to load</div>`;

}

}

/* RENDER */
function render(){

listContainer.innerHTML = "";

totalBox.innerText = filteredData.length;

if(filteredData.length === 0){
listContainer.innerHTML =
`<div class="loading">No Data Found</div>`;
return;
}

filteredData.forEach((item, index) => {

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="item-title">${item.item || ""}</div>
<div class="price-badge">${item.price || ""}</div>

<div class="read-more" onclick="toggle(this, ${index})">
Read More
</div>

<div class="expand-details" id="d-${index}">
${safeHTML(item.details || "")}
</div>
`;

listContainer.appendChild(card);

});

}

/* TOGGLE FIXED */
function toggle(btn, i){

const el = document.getElementById("d-" + i);

if(el.style.display === "block"){
el.style.display = "none";
btn.innerText = "Read More";
}else{
el.style.display = "block";
btn.innerText = "Read Less";
}

}

/* SEARCH */
searchInput.addEventListener("input", function(){

const v = this.value.toLowerCase();

if(v.length > 0){
searchBox.classList.add("active");
}else{
searchBox.classList.remove("active");
}

filteredData = allData.filter(i =>
(i.item||"").toLowerCase().includes(v) ||
(i.price||"").toLowerCase().includes(v) ||
(i.details||"").toLowerCase().includes(v)
);

render();

});

/* CLEAR */
function clearSearch(){
searchInput.value = "";
searchBox.classList.remove("active");
filteredData = allData;
render();
}

loadData();

</script>

</body>
</html>
